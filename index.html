<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Pioneer Group – Hanger Details</title>

<!-- QR + Excel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
  font-family: Arial, sans-serif;
  background:#0e1a2b;
  color:#222;
  padding:20px
}
.app{
  display:flex;
  gap:20px
}
.panel{
  background:#f7f1df;
  padding:20px;
  border-radius:6px;
  width:420px
}
input,button{
  padding:8px;
  margin:6px 0;
  width:100%
}
button{
  cursor:pointer;
  font-weight:bold
}
.deleteBtn{
  background:#b00020;
  color:#fff
}
.list{
  margin-top:15px;
  max-height:300px;
  overflow:auto;
  background:#fff;
  padding:10px
}
.row{
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #ddd;
  padding:6px 0
}
.row button{
  width:auto;
  padding:4px 8px
}
</style>
</head>

<body>

<h2 style="color:#fff">PIONEER GROUP – HANGER MASTER</h2>

<div class="app">

  <!-- LEFT -->
  <div class="panel">
    <h3>FIELD ENTRY</h3>

    <input id="searchBox" placeholder="Type Hanger No & press Enter">
    <button onclick="findRecord()">FIND</button>

    <hr>

    <input id="hangerNo" placeholder="Hanger No (required)">
    <input id="designNo" placeholder="Design No">
    <input id="embWidth" placeholder="Emb Width">
    <input id="fabricComp" placeholder="Fabric Composition">
    <input id="yarnComp" placeholder="Emb Yarn Composition">

    <button onclick="saveRecord()">SAVE & GENERATE QR</button>
    <button class="deleteBtn" onclick="deleteRecord()">DELETE ENTRY</button>
    <button onclick="resetForm()">RESET</button>
  </div>

  <!-- RIGHT -->
  <div class="panel">
    <h3>TAG PREVIEW</h3>
    <div id="qrBox"></div>

    <h3>ALL RECORDS</h3>
    <div class="list" id="recordList"></div>
  </div>

</div>

<script>
/* ===========================
   STORAGE KEY
=========================== */
const STORAGE_KEY = "hangerRecords";

/* ===========================
   LOAD DATA (ONLY FROM localStorage)
=========================== */
let records = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
let currentIndex = -1;

/* ===========================
   SAVE / UPDATE
=========================== */
function saveRecord(){
  const h = hangerNo.value.trim();
  if(!h){ alert("Hanger No required"); return; }

  const rec = {
    "HANGER NO": h,
    "DESIGN NO": designNo.value,
    "EMB WIDTH": embWidth.value,
    "FABRIC COMPOSITION": fabricComp.value,
    "YARN COMPOSITION": yarnComp.value
  };

  const idx = records.findIndex(r => r["HANGER NO"] === h);

  if(idx >= 0){
    records[idx] = rec;
    currentIndex = idx;
  }else{
    records.push(rec);
    currentIndex = records.length - 1;
  }

  persist();
  renderList();
  generateQR(rec);
}

/* ===========================
   DELETE (PERMANENT FIX)
=========================== */
function deleteRecord(){
  if(currentIndex < 0){
    alert("No record selected");
    return;
  }

  const h = records[currentIndex]["HANGER NO"];
  if(!confirm("Delete Hanger " + h + " ?")) return;

  records.splice(currentIndex,1);   // remove
  persist();                         // save
  resetForm();
  renderList();
  qrBox.innerHTML = "";
}

/* ===========================
   FIND
=========================== */
function findRecord(){
  const h = searchBox.value.trim();
  const idx = records.findIndex(r => r["HANGER NO"] === h);
  if(idx < 0){ alert("Not found"); return; }

  currentIndex = idx;
  loadToForm(records[idx]);
  generateQR(records[idx]);
}

/* ===========================
   HELPERS
=========================== */
function persist(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
}

function resetForm(){
  hangerNo.value = designNo.value = embWidth.value =
  fabricComp.value = yarnComp.value = searchBox.value = "";
  currentIndex = -1;
}

function loadToForm(r){
  hangerNo.value = r["HANGER NO"];
  designNo.value = r["DESIGN NO"];
  embWidth.value = r["EMB WIDTH"];
  fabricComp.value = r["FABRIC COMPOSITION"];
  yarnComp.value = r["YARN COMPOSITION"];
}

function renderList(){
  recordList.innerHTML = "";
  records.forEach((r,i)=>{
    const d = document.createElement("div");
    d.className = "row";
    d.innerHTML = `
      <span>${r["HANGER NO"]}</span>
      <button onclick="currentIndex=${i};loadToForm(records[${i}]);">Edit</button>
    `;
    recordList.appendChild(d);
  });
}

function generateQR(r){
  qrBox.innerHTML = "";
  new QRCode(qrBox, JSON.stringify(r));
}

/* ===========================
   INIT
=========================== */
renderList();
</script>

</body>
</html>
