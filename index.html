<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pioneer Group — Hanger Details</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --ink:#232019;
    --kraft:#e7dcc5;
    --kraft-dark:#d8c9a6;
    --paper:#f7f2e6;
    --line:#c9b98f;
    --orange:#d5541a;
    --orange-dark:#a6410f;
    --green-ok:#3f6b3a;
    --mono: 'Courier New', ui-monospace, SFMono-Regular, Menlo, monospace;
    --sans: 'Segoe UI', Arial, sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background: repeating-linear-gradient(135deg, #0a1830 0px, #0a1830 2px, #0f2148 2px, #0f2148 4px);
    font-family: var(--sans);
    color:var(--ink);
    padding:28px 16px 60px;
  }
  .wrap{ max-width:1160px; margin:0 auto; }
  header.top{
    display:flex; align-items:baseline; justify-content:space-between;
    color:#e9eef7; margin-bottom:22px; flex-wrap:wrap; gap:8px;
  }
  header.top h1{
    font-family: var(--mono); font-size:20px; letter-spacing:2px;
    text-transform:uppercase; margin:0; font-weight:700;
  }
  header.top .sub{ font-family: var(--mono); font-size:12px; color:#8fa3c9; letter-spacing:1px; }

  .status-bar{
    font-family:var(--mono); font-size:11.5px; color:#8fa3c9;
    margin:-10px 0 18px; letter-spacing:.5px;
  }
  .status-bar b{color:#e9eef7;}

  .grid{ display:grid; grid-template-columns: 1.1fr 1fr; gap:22px; }
  @media (max-width:820px){ .grid{grid-template-columns:1fr;} }

  .panel{
    background:var(--paper); border:1px solid var(--line); border-radius:4px;
    box-shadow: 0 8px 24px rgba(0,0,0,.35);
  }
  .panel-head{
    padding:12px 16px; border-bottom:1px dashed var(--line);
    font-family: var(--mono); font-size:12px; letter-spacing:2px; text-transform:uppercase;
    color:#6b6148; display:flex; justify-content:space-between; align-items:center;
  }
  .panel-body{padding:16px;}

  .lookup-row{
    display:flex; gap:8px; margin-bottom:14px; padding-bottom:14px;
    border-bottom:1px dashed var(--line);
  }
  .lookup-row input{
    flex:1; font-family:var(--mono); font-size:14px; padding:9px 10px;
    border:1px solid var(--line); border-radius:3px; background:#fffdf8; color:var(--ink);
  }
  .lookup-row input:focus{ outline:2px solid var(--orange); outline-offset:1px; }
  .lookup-btn{
    background:var(--ink); color:#f1e9d6; border:none; font-family:var(--mono);
    font-size:12px; letter-spacing:1px; text-transform:uppercase; padding:0 14px;
    border-radius:3px; cursor:pointer;
  }
  .lookup-btn:hover{ background:#3a352b; }
  .lookup-hint{ font-family:var(--mono); font-size:10.5px; color:#8a7a52; margin:-8px 0 12px; }
  .lookup-hint.found{ color:var(--green-ok); }
  .lookup-hint.new{ color:var(--orange-dark); }

  .field-row{
    display:grid; grid-template-columns: 1fr 1.4fr auto; gap:8px;
    align-items:center; margin-bottom:8px;
  }
  .field-row.locked{ grid-template-columns:1fr 1.4fr 24px; }
  .field-row label, .field-row input.key-input{
    font-family: var(--mono); font-size:12px; letter-spacing:.5px; color:#5c5340;
    text-transform:uppercase; padding:8px 6px;
  }
  .field-row input.key-input{
    background:transparent; border:none; border-bottom:1px dotted var(--line); width:100%;
  }
  .field-row input.val-input{
    font-family: var(--sans); font-size:14px; padding:8px 10px; border:1px solid var(--line);
    border-radius:3px; background:#fffdf8; color:var(--ink); width:100%;
  }
  .field-row input.val-input:focus, .field-row input.key-input:focus{
    outline:2px solid var(--orange); outline-offset:1px;
  }
  .rm-btn{
    background:none; border:none; color:#a08f6a; font-size:17px; cursor:pointer;
    line-height:1; padding:4px; width:24px;
  }
  .rm-btn:hover{ color:var(--orange-dark); }
  .rm-btn:focus-visible, .add-btn:focus-visible, .gen-btn:focus-visible,
  .reset-btn:focus-visible, .lookup-btn:focus-visible{ outline:2px solid var(--orange); outline-offset:2px; }

  .add-btn{
    margin-top:6px; width:100%; background:transparent; border:1.5px dashed var(--line);
    color:#6b6148; font-family: var(--mono); font-size:12px; letter-spacing:1.5px;
    text-transform:uppercase; padding:10px; border-radius:3px; cursor:pointer;
    transition: border-color .15s, color .15s;
  }
  .add-btn:hover{ border-color:var(--orange); color:var(--orange-dark); }

  .action-row{ display:flex; gap:10px; margin-top:16px; flex-wrap:wrap; }
  .gen-btn{
    flex:1; min-width:160px; background:var(--orange); color:#fff8ee; border:none;
    font-family:var(--mono); font-weight:700; letter-spacing:2px; text-transform:uppercase;
    font-size:13px; padding:13px; border-radius:3px; cursor:pointer; box-shadow: 0 3px 0 var(--orange-dark);
  }
  .gen-btn:hover{ filter:brightness(1.05); }
  .gen-btn:active{ transform:translateY(2px); box-shadow:none; }
  .reset-btn{
    background:transparent; border:1px solid var(--line); color:#6b6148; font-family:var(--mono);
    letter-spacing:1.5px; text-transform:uppercase; font-size:12px; padding:13px 16px;
    border-radius:3px; cursor:pointer;
  }
  .reset-btn:hover{ border-color:var(--orange-dark); color:var(--orange-dark); }
  .save-msg{
    font-family:var(--mono); font-size:11.5px; letter-spacing:.5px; margin-top:10px;
    color:var(--green-ok); min-height:14px;
  }
  .save-msg.err{ color:var(--orange-dark); }

  /* --- TAG PREVIEW --- */
  .tag-stage{ display:flex; justify-content:center; padding:26px 10px 10px; }
  .tag{
    position:relative; width:270px; background:var(--kraft); border:1px solid #b7a578;
    border-radius:10px; padding:18px 16px 20px; box-shadow: 0 10px 20px rgba(0,0,0,.3);
    background-image:
      radial-gradient(circle at 20% 15%, rgba(255,255,255,.15), transparent 40%),
      repeating-linear-gradient(0deg, rgba(120,105,70,.05) 0px, transparent 2px, transparent 4px);
  }
  .tag::before{
    content:""; position:absolute; top:-9px; left:50%; transform:translateX(-50%);
    width:18px; height:18px; background:#221f19; border-radius:50%;
    box-shadow: inset 0 0 0 3px var(--kraft-dark), 0 0 0 3px #b7a578;
  }
  .tag .string{
    position:absolute; top:-30px; left:50%; transform:translateX(-50%); width:2px; height:24px;
    background: repeating-linear-gradient(0deg,#8a7a52 0 4px, #6f6140 4px 8px);
  }
  .tag .brand{
    text-align:center; font-family:var(--mono); font-size:10.5px; letter-spacing:3px;
    text-transform:uppercase; color:#6b5f3f; border-bottom:1px dashed #b7a578;
    padding-bottom:8px; margin-bottom:10px;
  }
  .qr-holder{
    display:flex; justify-content:center; padding:8px; background:#fffdf7;
    border:1px solid #b7a578; margin-bottom:10px; min-height:150px; align-items:center;
  }
  .qr-holder img, .qr-holder canvas{ display:block; }
  .qr-placeholder{
    font-family:var(--mono); font-size:11px; color:#b3a888; text-align:center;
    letter-spacing:1px; padding:20px 6px;
  }
  .tag-data{ font-family:var(--mono); font-size:11.5px; line-height:1.55; }
  .tag-data .row{ display:flex; justify-content:space-between; gap:8px; border-bottom:1px dotted #b7a578; padding:2px 0; }
  .tag-data .row .k{ color:#6b5f3f; text-transform:uppercase; white-space:nowrap; }
  .tag-data .row .v{ color:#241f14; font-weight:700; text-align:right; word-break:break-word; }
  .tag-footer{ text-align:center; margin-top:10px; font-family:var(--mono); font-size:9.5px; color:#8a7a52; letter-spacing:2px; }
  .dl-row{ display:flex; justify-content:center; margin-top:14px; }
  .dl-btn{
    background:transparent; border:1px solid var(--line); color:#3a4a6b; font-family:var(--mono);
    font-size:11.5px; letter-spacing:1.5px; text-transform:uppercase; padding:9px 18px;
    border-radius:3px; cursor:pointer; display:none;
  }
  .dl-btn.show{ display:inline-block; }
  .dl-btn:hover{ border-color:var(--orange); color:var(--orange); }

  #printArea{ display:none; }
  @media print{
    body *{ visibility:hidden; }
    #printArea, #printArea *{ visibility:visible; }
    #printArea{
      display:block; position:absolute; top:0; left:0; width:100%;
      background:#fff; padding:20px;
    }
    #printArea .tag{ box-shadow:none; margin:0 auto; }
  }

  /* --- RECORDS BROWSER --- */
  .records-panel{ margin-top:20px; }
  .excel-row{ display:flex; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
  .excel-btn{
    flex:1; min-width:160px; background:#142c52; color:#e9eef7; border:1px solid #2a4a80;
    font-family:var(--mono); font-size:12px; letter-spacing:1px; text-transform:uppercase;
    padding:10px 12px; border-radius:3px; cursor:pointer;
  }
  .excel-btn:hover{ background:#1c3a6b; border-color:var(--orange); }
  .excel-msg{
    font-family:var(--mono); font-size:11.5px; color:var(--green-ok); min-height:14px; margin-bottom:8px;
  }
  .excel-msg.err{ color:var(--orange-dark); }
  .records-search{
    width:100%; font-family:var(--mono); font-size:13px; padding:9px 10px;
    border:1px solid var(--line); border-radius:3px; background:#fffdf8; color:var(--ink);
    margin-bottom:10px;
  }
  .records-search:focus{ outline:2px solid var(--orange); outline-offset:1px; }
  .records-list{ max-height:260px; overflow-y:auto; border:1px solid var(--line); border-radius:3px; background:#fffdf8; }
  .rec-item{
    display:flex; justify-content:space-between; align-items:center; gap:8px;
    padding:8px 10px; border-bottom:1px solid #e6dcc2; cursor:pointer; font-family:var(--mono); font-size:12px;
  }
  .rec-item:last-child{ border-bottom:none; }
  .rec-item:hover{ background:#f1e9d3; }
  .rec-item .rec-h{ font-weight:700; color:var(--orange-dark); min-width:38px; }
  .rec-item .rec-d{ color:#5c5340; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .rec-item .rec-tag{
    font-size:9.5px; letter-spacing:1px; text-transform:uppercase; color:#8a7a52;
    border:1px solid var(--line); padding:2px 6px; border-radius:2px;
  }
  .rec-empty{ padding:16px; text-align:center; color:#a08f6a; font-family:var(--mono); font-size:12px; }
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <h1>&#9635; PIONEER GROUP</h1>
    <div class="sub">Hanger Details &middot; QR Tag Generator</div>
  </header>

  <div class="status-bar" id="statusBar">Loading saved data&hellip;</div>

  <div class="grid">

    <!-- FORM PANEL -->
    <div class="panel">
      <div class="panel-head">
        <span>Field Entry</span>
        <span id="fieldCount">5 fields</span>
      </div>
      <div class="panel-body">

        <div class="lookup-row">
          <input type="text" id="lookupInput" placeholder="Type Hanger No and press Enter">
          <button class="lookup-btn" id="lookupBtn" type="button">Find</button>
        </div>
        <div class="lookup-hint" id="lookupHint">Existing hangers load automatically. New ones start blank.</div>

        <div id="fieldsContainer"></div>

        <button class="add-btn" id="addFieldBtn" type="button">+ Add New Field</button>

        <div class="action-row">
          <button class="gen-btn" id="genBtn" type="button">Save &amp; Generate QR</button>
          <button class="reset-btn" id="resetBtn" type="button">Reset</button>
        </div>
        <div class="save-msg" id="saveMsg"></div>
      </div>
    </div>

    <!-- PREVIEW PANEL -->
    <div class="panel">
      <div class="panel-head">
        <span>Tag Preview</span>
        <span>Live</span>
      </div>
      <div class="panel-body">
        <div class="tag-stage">
          <div class="tag" id="tagCard">
            <div class="string"></div>
            <div class="brand">Hang Tag &middot; QR Code</div>
            <div class="qr-holder" id="qrHolder">
              <div class="qr-placeholder">Enter Hanger No and<br>click "Save &amp; Generate QR"</div>
            </div>
            <div class="tag-data" id="tagData"></div>
            <div class="tag-footer">SCAN FOR DETAILS</div>
          </div>
        </div>
        <div class="dl-row">
          <button class="dl-btn" id="dlBtn" type="button">&#8681; Download PNG</button>
  <button class="dl-btn" id="printBtn" type="button">&#128424; Print Tag</button>
  <button class="dl-btn show" id="enquireBtn" type="button">✉ Send to Enquire</button>
        </div>
      </div>
    </div>

  </div>

  <div id="printArea"></div>

  <!-- RECORDS BROWSER -->
  <div class="panel records-panel">
    <div class="panel-head">
      <span>All Records</span>
      <span id="recCount">0</span>
    </div>
    <div class="panel-body">
      <div class="excel-row">
        <button class="excel-btn" id="exportBtn" type="button">&#8681; Export to Excel</button>
        <button class="excel-btn" id="importBtn" type="button">&#8593; Update from Excel</button>
        <input type="file" id="importFile" accept=".xlsx,.xls,.csv" style="display:none;">
      </div>
      <div class="excel-msg" id="excelMsg"></div>
      <input type="text" class="records-search" id="recSearch" placeholder="Search by Hanger No or Design No...">
      <div class="records-list" id="recList"></div>
    </div>
  </div>

</div>

const DEFAULT_KEYS = ["Hanger No","Design No","Emb Width","Fabric Composition","Emb Yarn Composition"];
const OVERRIDES_KEY = "hanger-overrides";
const CUSTOM_FIELDS_KEY = "custom-field-defs";

let overrides = {};        // { hangerNo: {fieldKey: value, ...} }
let customFieldDefs = [];  // extra field names beyond the 5 defaults
let fields = [];           // current form state: [{key,value,locked,required}]
let mergedIndex = {};       // hangerNo -> merged record (for search/lookup)

const statusBar = document.getElementById('statusBar');
const container = document.getElementById('fieldsContainer');
const fieldCountEl = document.getElementById('fieldCount');
const qrHolder = document.getElementById('qrHolder');
const tagData = document.getElementById('tagData');
const dlBtn = document.getElementById('dlBtn');
const printBtn = document.getElementById('printBtn');
const saveMsg = document.getElementById('saveMsg');
const lookupInput = document.getElementById('lookupInput');
const lookupHint = document.getElementById('lookupHint');
const recList = document.getElementById('recList');
const recSearch = document.getElementById('recSearch');
const recCount = document.getElementById('recCount');

function baseDefaultFields(){
  return [
    { key: "Hanger No", value: "", locked: true, required: true },
    { key: "Design No", value: "", locked: false, required: false },
    { key: "Emb Width", value: "", locked: false, required: false },
    { key: "Fabric Composition", value: "", locked: false, required: false },
    { key: "Emb Yarn Composition", value: "", locked: false, required: false }
  ].concat(customFieldDefs.map(k => ({ key: k, value: "", locked: false, required: false })));
}

function buildMergedIndex(){
  mergedIndex = {};
  BASE_DATA.forEach(rec => {
    mergedIndex[String(rec["Hanger No"]).trim()] = Object.assign({}, rec);
  });
  Object.keys(overrides).forEach(h => {
    const existing = mergedIndex[h] || { "Hanger No": h };
    mergedIndex[h] = Object.assign({}, existing, overrides[h]);
  });
}

async function loadStorage(){
  try{
    const ov = await window.storage.get(OVERRIDES_KEY, false);
    overrides = ov ? JSON.parse(ov.value) : {};
  }catch(e){ overrides = {}; }
  try{
    const cf = await window.storage.get(CUSTOM_FIELDS_KEY, false);
    customFieldDefs = cf ? JSON.parse(cf.value) : [];
  }catch(e){ customFieldDefs = []; }
  buildMergedIndex();
  const addedCount = Object.keys(overrides).length;
  statusBar.innerHTML = 'Loaded <b>' + BASE_DATA.length + '</b> hangers from your sheet' +
    (addedCount ? ' + <b>' + addedCount + '</b> saved locally' : '') + '.';
  fields = baseDefaultFields();
  render();
  renderRecordsList('');
}

function render(){
  container.innerHTML = '';
  fields.forEach(function(f, idx){
    const row = document.createElement('div');
    row.className = 'field-row' + (f.locked ? ' locked' : '');

    const keyInput = document.createElement('input');
    keyInput.className = 'key-input';
    keyInput.value = f.key;
    keyInput.placeholder = 'Field Name';
    if(f.locked){ keyInput.disabled = true; }
    keyInput.addEventListener('input', function(){ f.key = keyInput.value; });

    const valInput = document.createElement('input');
    valInput.className = 'val-input';
    valInput.type = 'text';
    valInput.value = f.value;
    valInput.placeholder = f.required ? 'Hanger No (required)' : 'Enter value';
    valInput.addEventListener('input', function(){ f.value = valInput.value; });
    if(f.required){
      valInput.addEventListener('keydown', function(e){
        if(e.key === 'Enter'){ doLookup(valInput.value); }
      });
    }

    row.appendChild(keyInput);
    row.appendChild(valInput);

    if(f.locked){
      const lockSpan = document.createElement('span');
      lockSpan.title = 'This field is required';
      lockSpan.textContent = '\u2605';
      lockSpan.style.color = '#a6410f';
      lockSpan.style.fontSize = '13px';
      lockSpan.style.textAlign = 'center';
      row.appendChild(lockSpan);
    } else {
      const rmBtn = document.createElement('button');
      rmBtn.className = 'rm-btn';
      rmBtn.type = 'button';
      rmBtn.textContent = '\u2715';
      rmBtn.title = 'Remove field';
      rmBtn.addEventListener('click', async function(){
        const removedKey = f.key;
        fields.splice(idx, 1);
        render();
        if(removedKey && customFieldDefs.includes(removedKey)){
          customFieldDefs = customFieldDefs.filter(k => k !== removedKey);
          try{ await window.storage.set(CUSTOM_FIELDS_KEY, JSON.stringify(customFieldDefs), false); }catch(e){}
        }
      });
      row.appendChild(rmBtn);
    }

    container.appendChild(row);
  });
  fieldCountEl.textContent = fields.length + ' fields';
}

document.getElementById('addFieldBtn').addEventListener('click', async function(){
  fields.push({ key: '', value: '', locked: false, required: false });
  render();
  const lastInput = container.querySelectorAll('.key-input');
  lastInput[lastInput.length - 1].focus();
});

document.getElementById('resetBtn').addEventListener('click', function(){
  fields = baseDefaultFields();
  render();
  qrHolder.innerHTML = '<div class="qr-placeholder">Enter Hanger No and<br>click "Save &amp; Generate QR"</div>';
  tagData.innerHTML = '';
  dlBtn.classList.remove('show');
  printBtn.classList.remove('show');
  saveMsg.textContent = '';
  lookupInput.value = '';
  lookupHint.textContent = 'Existing hangers load automatically. New ones start blank.';
  lookupHint.className = 'lookup-hint';
});

function renderQR(payload){
  qrHolder.innerHTML = '';
  const qrBox = document.createElement('div');
  qrHolder.appendChild(qrBox);
  new QRCode(qrBox, {
    text: payload.text, width: 150, height: 150,
    colorDark: "#241f14", colorLight: "#fffdf7", correctLevel: QRCode.CorrectLevel.M
  });

  tagData.innerHTML = '';
  payload.rows.forEach(function(r){
    const rowEl = document.createElement('div');
    rowEl.className = 'row';
    const kEl = document.createElement('span'); kEl.className = 'k'; kEl.textContent = r.k;
    const vEl = document.createElement('span'); vEl.className = 'v'; vEl.textContent = r.v;
    rowEl.appendChild(kEl); rowEl.appendChild(vEl);
    tagData.appendChild(rowEl);
  });

  dlBtn.classList.remove('show');
  printBtn.classList.remove('show');
  setTimeout(function(){
    dlBtn.classList.add('show');
    printBtn.classList.add('show');
  }, 150);
}

function doLookup(hangerNo){
  hangerNo = (hangerNo || '').trim();
  if(!hangerNo){ return; }
  const rec = mergedIndex[hangerNo];

  const preservedCustom = fields.filter(f => !f.locked && !DEFAULT_KEYS.includes(f.key) && !customFieldDefs.includes(f.key));
  fields = baseDefaultFields();
  fields[0].value = hangerNo;

  if(rec){
    fields.forEach(f => {
      if(rec[f.key] !== undefined){ f.value = String(rec[f.key]); }
    });
    Object.keys(rec).forEach(k => {
      if(!DEFAULT_KEYS.includes(k) && !customFieldDefs.includes(k)){
        fields.push({ key: k, value: String(rec[k]), locked: false, required: false });
      }
    });
    lookupHint.textContent = 'Hanger #' + hangerNo + ' found — QR shown below. Edit and save to update.';
    lookupHint.className = 'lookup-hint found';
    render();
    renderQR(buildPayload());
    saveMsg.textContent = '';
  } else {
    preservedCustom.forEach(f => fields.push(f));
    lookupHint.textContent = 'Hanger #' + hangerNo + ' is new — fill the fields and save it.';
    lookupHint.className = 'lookup-hint new';
    render();
    qrHolder.innerHTML = '<div class="qr-placeholder">Hanger #' + hangerNo + ' is new.<br>Fill fields and click "Save &amp; Generate QR"</div>';
    tagData.innerHTML = '';
    dlBtn.classList.remove('show');
    printBtn.classList.remove('show');
  }
}

document.getElementById('lookupBtn').addEventListener('click', function(){ doLookup(lookupInput.value); });
lookupInput.addEventListener('keydown', function(e){ if(e.key === 'Enter'){ doLookup(lookupInput.value); } });

function buildPayload(){
  const lines = [];
  const displayRows = [];
  const rowObj = {};
  fields.forEach(function(f){
    const k = (f.key || '').trim();
    const v = (f.value || '').trim();
    if(k && v){
      lines.push(k + ': ' + v);
      displayRows.push({k:k, v:v});
      rowObj[k] = v;
    }
  });
  return { text: lines.join('\n'), rows: displayRows, obj: rowObj };
}

document.getElementById('genBtn').addEventListener('click', async function(){
  const hangerField = fields.find(f => f.required);
  const hangerNo = hangerField ? hangerField.value.trim() : '';
  if(!hangerNo){
    document.querySelectorAll('.val-input')[0].focus();
    saveMsg.textContent = 'Hanger No is required. Please fill it first.';
    saveMsg.className = 'save-msg err';
    return;
  }

  const payload = buildPayload();
  if(!payload.text){
    saveMsg.textContent = 'Please fill at least one field.';
    saveMsg.className = 'save-msg err';
    return;
  }

  // Persist: save this hanger's data as an override, and remember any new custom field names.
  try{
    overrides[hangerNo] = payload.obj;
    await window.storage.set(OVERRIDES_KEY, JSON.stringify(overrides), false);

    let newCustom = false;
    fields.forEach(f => {
      const k = (f.key || '').trim();
      if(k && !DEFAULT_KEYS.includes(k) && !customFieldDefs.includes(k)){
        customFieldDefs.push(k);
        newCustom = true;
      }
    });
    if(newCustom){
      await window.storage.set(CUSTOM_FIELDS_KEY, JSON.stringify(customFieldDefs), false);
    }
    buildMergedIndex();
    renderRecordsList(recSearch.value);
    saveMsg.textContent = 'Saved. Hanger #' + hangerNo + ' will be here next time too.';
    saveMsg.className = 'save-msg';
  }catch(e){
    saveMsg.textContent = 'Could not save — QR generated below anyway.';
    saveMsg.className = 'save-msg err';
  }

  renderQR(payload);
});

dlBtn.addEventListener('click', function(){
  const canvas = qrHolder.querySelector('canvas');
  const img = qrHolder.querySelector('img');
  const hangerField = fields.find(f => f.required);
  const name = 'QR_' + (hangerField && hangerField.value.trim() ? hangerField.value.trim() : 'hanger') + '.png';
  let dataUrl = null;
  if(canvas){ dataUrl = canvas.toDataURL('image/png'); }
  else if(img){ dataUrl = img.src; }
  if(!dataUrl){ return; }
  const a = document.createElement('a');
  a.href = dataUrl; a.download = name;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
});

document.getElementById('printBtn').addEventListener('click', function(){
  const tagCard = document.getElementById('tagCard');
  const printArea = document.getElementById('printArea');
  if(!tagCard || !qrHolder.querySelector('canvas, img')){ return; }
  printArea.innerHTML = '';
  printArea.appendChild(tagCard.cloneNode(true));
  window.print();
});


function renderRecordsList(filterText){
  const q = (filterText || '').trim().toLowerCase();
  const hangerNos = Object.keys(mergedIndex).sort((a,b) => {
    const na = parseFloat(a), nb = parseFloat(b);
    if(!isNaN(na) && !isNaN(nb)) return na - nb;
    return a.localeCompare(b);
  });
  const filtered = hangerNos.filter(h => {
    if(!q) return true;
    const rec = mergedIndex[h];
    return h.toLowerCase().includes(q) ||
      (rec["Design No"] || '').toLowerCase().includes(q);
  });
  recCount.textContent = filtered.length + ' / ' + hangerNos.length;
  recList.innerHTML = '';
  if(filtered.length === 0){
    recList.innerHTML = '<div class="rec-empty">No matching hangers.</div>';
    return;
  }
  filtered.slice(0, 300).forEach(h => {
    const rec = mergedIndex[h];
    const item = document.createElement('div');
    item.className = 'rec-item';
    const isNewLocal = overrides.hasOwnProperty(h) && !BASE_DATA.some(b => String(b["Hanger No"]) === h);
    item.innerHTML =
      '<span class="rec-h">#' + h + '</span>' +
      '<span class="rec-d">' + (rec["Design No"] || '') + ' &middot; ' + (rec["Emb Width"] || '') + '</span>' +
      (isNewLocal ? '<span class="rec-tag">saved</span>' : '<span class="rec-tag">sheet</span>');
    item.addEventListener('click', function(){
      lookupInput.value = h;
      doLookup(h);
      window.scrollTo({top:0, behavior:'smooth'});
    });
    recList.appendChild(item);
  });
}

recSearch.addEventListener('input', function(){ renderRecordsList(recSearch.value); });

// ---- Excel Export ----
document.getElementById('exportBtn').addEventListener('click', function(){
  const excelMsg = document.getElementById('excelMsg');
  try{
    const allKeys = DEFAULT_KEYS.concat(customFieldDefs);
    const hangerNos = Object.keys(mergedIndex).sort((a,b) => {
      const na = parseFloat(a), nb = parseFloat(b);
      if(!isNaN(na) && !isNaN(nb)) return na - nb;
      return a.localeCompare(b);
    });
    const rows = hangerNos.map(h => {
      const rec = mergedIndex[h];
      const row = {};
      allKeys.forEach(k => { row[k] = rec[k] !== undefined ? rec[k] : ''; });
      return row;
    });
    const ws = XLSX.utils.json_to_sheet(rows, { header: allKeys });
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Hanger Details');
    XLSX.writeFile(wb, 'Pioneer_Group_Hanger_Details.xlsx');
    excelMsg.textContent = 'Exported ' + rows.length + ' hangers to Excel.';
    excelMsg.className = 'excel-msg';
  }catch(e){
    excelMsg.textContent = 'Export failed: ' + e.message;
    excelMsg.className = 'excel-msg err';
  }
});

// ---- Excel Import (update data via Excel) ----
const importFile = document.getElementById('importFile');
document.getElementById('importBtn').addEventListener('click', function(){ importFile.click(); });

importFile.addEventListener('change', async function(e){
  const excelMsg = document.getElementById('excelMsg');
  const file = e.target.files[0];
  if(!file) return;
  try{
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array' });
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });

    if(!rows.length){
      excelMsg.textContent = 'The Excel file has no rows.';
      excelMsg.className = 'excel-msg err';
      return;
    }

    const hangerKeyName = Object.keys(rows[0]).find(k => k.trim().toLowerCase() === 'hanger no');
    if(!hangerKeyName){
      excelMsg.textContent = 'Could not find a "Hanger No" column in the file.';
      excelMsg.className = 'excel-msg err';
      return;
    }

    let updated = 0, added = 0, newCols = [];
    rows.forEach(row => {
      const hangerNo = String(row[hangerKeyName]).trim();
      if(!hangerNo) return;
      const rec = {};
      Object.keys(row).forEach(col => {
        const trimmedCol = col.trim();
        const val = String(row[col]).trim();
        if(val === '') return;
        rec[trimmedCol === hangerKeyName.trim() ? 'Hanger No' : trimmedCol] = val;
        if(!DEFAULT_KEYS.includes(trimmedCol) && !customFieldDefs.includes(trimmedCol) && !newCols.includes(trimmedCol)){
          newCols.push(trimmedCol);
        }
      });
      if(overrides.hasOwnProperty(hangerNo) || mergedIndex[hangerNo]){ updated++; } else { added++; }
      overrides[hangerNo] = Object.assign({}, mergedIndex[hangerNo] || {}, overrides[hangerNo] || {}, rec);
    });

    if(newCols.length){ customFieldDefs = customFieldDefs.concat(newCols); }

    await window.storage.set(OVERRIDES_KEY, JSON.stringify(overrides), false);
    await window.storage.set(CUSTOM_FIELDS_KEY, JSON.stringify(customFieldDefs), false);

    buildMergedIndex();
    fields = baseDefaultFields();
    render();
    renderRecordsList(recSearch.value);

    excelMsg.textContent = 'Updated from Excel: ' + updated + ' existing, ' + added + ' new hangers saved.';
    excelMsg.className = 'excel-msg';
    statusBar.innerHTML = 'Loaded <b>' + BASE_DATA.length + '</b> hangers from your sheet + <b>' +
      Object.keys(overrides).length + '</b> saved locally.';
  }catch(err){
    excelMsg.textContent = 'Import failed: ' + err.message;
    excelMsg.className = 'excel-msg err';
  }
  importFile.value = '';
});
